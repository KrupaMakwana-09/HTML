<html>
    <head>
        <title> Student Registration form</title>
            <style>
        body{
            font-family: Cambria;
            font-size: 12px;
        }
    </style>

    </head>
    <body>
        <form>
        <h1 align="center">Student Registration form</h1>
        <br><br>
        <table width="50%"align="center"></table>
        <tr>
        <td><label>First Name</label></td>
        <td><input type="text" name="First Name" placeholder="Enter First Name" required/></td>
        </tr>
        <br><br>
        <tr>
        <td><label>Email</label></td>
        <td><input type="email" value="@gmail.com" required/></td>
        </tr>
        <br><br>
        <tr>
        <td><label>Mobile No</label></td>
        <td><input type="text" name="Mobile No" maxlength="10" required/></td>
        </tr>
        <br><br>
        <tr>
        <td><label>Address</label></td>
        <td><textarea></textarea></td>
        </tr>
        <br><br>
        <tr>
        <td><label>Nationality</label></td>
        <td><input type="text" name="Nationality" required/></td>
        </tr>
        <br><br>
        <tr>
        <td><label>DOB</label></td>
        <td><input type="date" id="DOB" name="DOB" required></td>
        </tr>
        <br><br>
        <tr>
        <label>Gender</label>
        <td><input type="radio" name="gender">Male</td>
        <td><input type="radio" name="gender">Female</td>
        </tr>
        <br><br>
        <tr>
        <td><label>Highest Degree</label></td>
        <select>
            <option>Select Degree</option>
            <option>B.TECH</option>
            <option>M.TECH</option>
            <option>MBA</option>
            <option>BBA</option>
        </select>
        </tr>
        <br><br>
        <tr>
        <td><label>CPI</label></td>
        <td><input type="text"></td>
        </tr>
        <br><br>
        <tr>
        <td><label>University</label></td>
        <td><input type="text"></td>
        </tr>
        <br><br>
        <tr>
        <td><label>Passing Year</label></td>
        <select>
            <option>Select Your Passing Year</option>
            <option>2024</option>
            <option>2025</option>
            <option>2026</option>
            <option>2027</option>
            <option>2028</option>
        </select>
        </tr>
        <br><br>
        <tr>
        <td><button type="Submit">Submit</td>
        </tr>
        <tr>
        <td><button type="reset">Cancel</td>
        </tr>
        </table>
         </form>
    </body>
</html>

<html>
    <head>
        <title> Employee Registration</title>
        <style>
        body{
            font-family: Cambria;
            font-size: 12px;
        }
    </style>
    </head>
    <body>
        <form>
            <h1 align="center" style="color:black">Employee Registration</h1>
            <h2 align="center">Personal Information</h2>
            <table width="50%"align="center">
                <tr>
                    <td><label>Employee ID</label></td>
                    <td><input type="text" name="employeeid" placeholder="Enter Employee ID"/></td>
                    <td><label>Employee name</label></td>
                    <td><input type="text" name="employee name" placeholder="Enter Employee name"/></td>
                </tr>
                <tr>
                    <td>Email</td>
                    <td><input type="email" value="@gmail.com" required/></td>
                    <td>Contact No</td>
                    <td><input type="number" name="Contact No" placeholder="Contact No"/></td>
                </tr>
                <tr>
                    <td>Marital Status</td>
                    <td><input type="radio" name="Marital Status">Single</td>
                    <td><input type="radio" name="Marital Status">Married</td>
                </tr>
            </table>
            <h2 align="center">Education Qulification</h2>
            <table width="50%" align="center">
                <tr>
                    <td><label>Education</label></td>
                    <td><input type="text" name="Education" placeholder="Enter Education details"/></td>
                    <td><label>Experience</label></td>
                    <td><input type="text" name="Experience" placeholder="Enter Experience details"/></td>
                </tr>
            </table>
            <h2 align="center">Job Details </h2>
            <table width="50%" align="center">
                <tr>
                    <td><label>Designation</label></td>
                    <td><input type="text" name="Designation" placeholder="Enter Designation details"/></td>
                    <td><label>Job Location</label></td>
                    <td><input type="text" name="Job Location" placeholder="Enter Job Location"/></td>
                </tr>
                <tr>
                    <td><label>Salary</label></td>
                    <td><input type="text" name="Salary" placeholder="Enter Salary details"/></td>
                </tr>
            </table>
            <br>
            <hr>
           <table align="center">
            <tr>
                <td><input type="submit" value="Register"/></td>
            </tr>
            </table>
        </form>
    </body>
</html>

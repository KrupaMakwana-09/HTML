<html>
<head>
    <title>Marwadi University - Rajkot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #f2f2f2;
            font-family: Cambria;
            font-size: 12px;
        }

        /* Header */
        header {
            background-color: #02479c;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
        }

        .logo img{
            width: 200px;
            height: auto;
        }

        .top-nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-size: 18px;
        }
        .container {
            display: flex;
        }
        .sidebar {
            width: 200px;
            background-color: rgb(174, 3, 3);
            padding-top: 20px;
            min-height: 100vh;
        }

        .sidebar ul {
            list-style-type: none;
        }

        .sidebar ul li {
            padding: 25px;
            color: rgb(253, 253, 253);
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .sidebar ul li span {
            margin-right: 10px;
        }

        /* Main Content */
        .main-content {
            padding: 30px;
            flex-grow: 1;
        }

        .main-content h2 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        /* Cards */
        .cards {
            display: flex;
            gap: 20px;
        }

        .card {
            background-color: white;
            padding: 25px;
            border-radius: 30px;
            width: 200px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h3 {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <header>
        <div class="text-align">Marwadi University</div>
        <nav class="top-nav">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Login</a>
        </nav>
    </header>

    <div class="container">
        <aside class="sidebar">
            <ul>
                <li><span></span> Home</li>
                <li><span></span> Placement</li>
                <li><span></span> Recruitment</li>
                <li><span></span> Faculty</li>
                <li><span></span> News</li>
            </ul>
        </aside>

        <main class="main-content">
            <h2>Recent Placements</h2>
            <div class="cards">
                <div class="card">
                    <p>Profile</p>
                    <h3>Harsh Kansagara</h3>
                    <p>L&T PVT LTD</p>
                    <p>Package: ₹4.5 LPA</p>
                </div>
                <div class="card">
                    <p>Profile</p>
                    <h3>SHYAM KANTESARIYA</h3>
                    <p>TCS</p>
                    <p>Package: ₹3.2 LPA</p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
